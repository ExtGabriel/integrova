<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estados Financieros</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/formularios.css">
    
    <style>
        .estados-financieros-container {
            display: flex;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: visible;
        }
        
        .sidebar {
            width: 250px;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow: visible;
        }
        
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: #495057;
        }
        
        .sidebar-icons {
            display: flex;
            gap: 8px;
        }
        
        .sidebar-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #6c757d;
            border-radius: 3px;
            transition: all 0.2s ease;
        }
        
        .sidebar-icon:hover {
            background-color: #e9ecef;
            color: #495057;
        }
        
        .areas-section {
            margin-top: 20px;
            position: relative;
        }
        
        .areas-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .areas-title {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .add-button-container {
            position: relative;
        }
        
        .add-button {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #007bff;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        
        .add-button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        
        .dropdown-content {
            position: absolute;
            top: 100%;
            right: 0;
            background-color: white !important;
            border: 2px solid #dee2e6 !important;
            border-radius: 8px !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2) !important;
            z-index: 999999 !important;
            min-width: 250px !important;
            display: none;
            margin-top: 8px;
            padding: 8px 0 !important;
        }
        
        .dropdown-content.show {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        
        .dropdown-item {
            padding: 15px 20px !important;
            cursor: pointer !important;
            border-bottom: 1px solid #f1f3f4 !important;
            transition: all 0.2s ease !important;
            font-size: 14px !important;
            color: #212529 !important;
            display: block !important;
            width: 100% !important;
            text-align: left !important;
            background-color: white !important;
            font-weight: 500 !important;
            line-height: 1.4 !important;
        }
        
        .dropdown-item:hover {
            background-color: #f8f9fa !important;
            color: #007bff !important;
        }
        
        .dropdown-item:last-child {
            border-bottom: none !important;
        }
        
        .dropdown-item i {
            margin-right: 12px !important;
            color: #007bff !important;
            font-size: 16px !important;
            width: 20px !important;
            display: inline-block !important;
        }
        
        .main-content {
            flex: 1;
            background-color: white;
            display: flex;
            flex-direction: column;
        }
        
        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid #dee2e6;
            background-color: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .content-title {
            font-size: 18px;
            font-weight: 600;
            color: #212529;
            margin: 0;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .nav-button {
            padding: 8px 16px;
            border: 1px solid #dee2e6;
            background-color: white;
            color: #495057;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .nav-button:hover {
            background-color: #e9ecef;
            border-color: #adb5bd;
        }
        
        .nav-button.primary {
            background-color: #007bff;
            border-color: #007bff;
            color: white;
        }
        
        .nav-button.primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
        
        .content-body {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6c757d;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-text {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .empty-subtext {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .right-sidebar {
            width: 300px;
            background-color: #f8f9fa;
            border-left: 1px solid #dee2e6;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .right-sidebar-header {
            font-size: 14px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #dee2e6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tabs-container {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        
        .tabs-nav {
            display: flex;
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 2px;
        }
        
        .tab-button {
            background: none;
            border: none;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 500;
            color: #6c757d;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .tab-button:hover {
            background: #e9ecef;
            color: #495057;
        }
        
        .tab-button.active {
            background: #007bff;
            color: white;
            border-bottom: 2px solid #0056b3;
        }
        
        .tab-button .badge {
            background: rgba(255,255,255,0.3);
            color: white;
            padding: 1px 4px;
            border-radius: 8px;
            font-size: 9px;
            margin-left: 2px;
        }
        
        .tab-button:not(.active) .badge {
            background: #6c757d;
        }
        
        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .tab-section {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        .tab-section-header {
            background: #007bff;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .tab-section-title {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tab-section-actions {
            display: flex;
            gap: 4px;
        }
        
        .tab-action-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 2px 4px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s ease;
        }
        
        .tab-action-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .tab-section-content {
            padding: 10px;
            background: #fafbfc;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .tab-item {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 3px;
            padding: 8px 10px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #495057;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        
        .tab-item:hover {
            border-color: #007bff;
            box-shadow: 0 1px 3px rgba(0,123,255,0.1);
        }
        
        .tab-item-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        
        .tab-item-actions {
            display: flex;
            gap: 4px;
        }
        
        .tab-item-action {
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 2px;
            border-radius: 2px;
            font-size: 10px;
            transition: all 0.2s ease;
        }
        
        .tab-item-action:hover {
            background: #e9ecef;
            color: #007bff;
        }
        
        .empty-tab {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            font-size: 11px;
            padding: 20px;
        }
        
        .no-tabs-message {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            font-size: 12px;
            padding: 20px;
        }
        
        .main-container {
            display: flex;
            flex: 1;
        }
        
        .main-wrapper {
            display: flex;
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="estados-financieros-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Document Map</div>
                <div class="sidebar-icons">
                    <div class="sidebar-icon" title="Deshacer/Rehacer">
                        <i class="bi bi-arrow-clockwise"></i>
                    </div>
                    <div class="sidebar-icon" title="Imprimir">
                        <i class="bi bi-printer"></i>
                    </div>
                    <div class="sidebar-icon" title="Cerrar">
                        <i class="bi bi-x"></i>
                    </div>
                    <div class="sidebar-icon" title="Configuración">
                        <i class="bi bi-gear"></i>
                    </div>
                </div>
            </div>
            
            <div class="areas-section">
                <div class="areas-header">
                    <div class="areas-title">ÁREAS</div>
                    <div class="add-button-container">
                        <button class="add-button" onclick="toggleAreasDropdown(event)">
                            <i class="bi bi-plus"></i>
                        </button>
                        <div id="areasDropdown" style="
                            position: absolute;
                            top: 100%;
                            right: -50px;
                            background: white;
                            border: 2px solid #007bff;
                            border-radius: 8px;
                            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
                            z-index: 999999;
                            min-width: 250px;
                            display: none;
                            margin-top: 8px;
                            padding: 8px 0;
                        ">
                            <div style="
                                padding: 15px 20px;
                                cursor: pointer;
                                border-bottom: 1px solid #f1f3f4;
                                font-size: 14px;
                                color: #212529;
                                display: block;
                                width: 100%;
                                text-align: left;
                                background: white;
                                font-weight: 500;
                            " onclick="addNewArea()" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background='white'">
                                <i class="bi bi-folder-plus" style="margin-right: 12px; color: #007bff; font-size: 16px;"></i>
                                Nueva Área
                            </div>
                            <div style="
                                padding: 15px 20px;
                                cursor: pointer;
                                border-bottom: 1px solid #f1f3f4;
                                font-size: 14px;
                                color: #212529;
                                display: block;
                                width: 100%;
                                text-align: left;
                                background: white;
                                font-weight: 500;
                            " onclick="addNewNotesArea()" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background='white'">
                                <i class="bi bi-sticky" style="margin-right: 12px; color: #007bff; font-size: 16px;"></i>
                                Nueva área de notas
                            </div>
                            <div style="
                                padding: 15px 20px;
                                cursor: pointer;
                                border-bottom: 1px solid #f1f3f4;
                                font-size: 14px;
                                color: #212529;
                                display: block;
                                width: 100%;
                                text-align: left;
                                background: white;
                                font-weight: 500;
                            " onclick="addTableOfContents()" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background='white'">
                                <i class="bi bi-list-ul" style="margin-right: 12px; color: #007bff; font-size: 16px;"></i>
                                Tabla de contenido
                            </div>
                            <div style="
                                padding: 15px 20px;
                                cursor: pointer;
                                font-size: 14px;
                                color: #212529;
                                display: block;
                                width: 100%;
                                text-align: left;
                                background: white;
                                font-weight: 500;
                            " onclick="addEmbeddedPDF()" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background='white'">
                                <i class="bi bi-file-pdf" style="margin-right: 12px; color: #007bff; font-size: 16px;"></i>
                                PDF incrustado
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-wrapper">
            <div class="main-content">
                <div class="content-header">
                    <h1 class="content-title">Estados Financieros</h1>
                    <div class="header-actions">
                        <button class="nav-button" onclick="goBack()">
                            <i class="bi bi-arrow-left"></i> Regresar
                        </button>
                    </div>
                </div>
                <div class="content-body">
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="bi bi-file-earmark-text"></i>
                        </div>
                        <div class="empty-text">No hay áreas configuradas</div>
                        <div class="empty-subtext">Use el botón + para agregar su primera área</div>
                    </div>
                </div>
            </div>
            
            <!-- Right Sidebar -->
            <div class="right-sidebar">
                <div class="right-sidebar-header">
                    <i class="bi bi-list-check" style="margin-right: 8px;"></i>
                    Elementos Seleccionados
                </div>
                <div class="tabs-container">
                    <div class="no-tabs-message">
                        <i class="bi bi-inbox" style="font-size: 24px; display: block; margin-bottom: 10px;"></i>
                        No hay elementos seleccionados
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Navigation functions
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // Si no hay historial, cerrar la ventana
                window.close();
            }
        }
        
        function toggleAreasDropdown(event) {
            event.preventDefault();
            event.stopPropagation();
            
            const dropdown = document.getElementById('areasDropdown');
            
            if (!dropdown) {
                return;
            }
            
            // Simple toggle
            if (dropdown.style.display === 'block') {
                dropdown.style.display = 'none';
                dropdown.classList.remove('show');
            } else {
                dropdown.style.display = 'block';
                dropdown.classList.add('show');
            }
        }
        
        function addNewArea() {
            closeDropdown(); // Cerrar el dropdown
            
            // Crear nueva área en el contenido principal
            const contentBody = document.querySelector('.content-body');
            
            // Eliminar el estado vacío si existe
            const emptyState = contentBody.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            // Crear contenedor para las áreas si no existe
            let areasContainer = contentBody.querySelector('.areas-container');
            if (!areasContainer) {
                areasContainer = document.createElement('div');
                areasContainer.className = 'areas-container';
                areasContainer.style.cssText = `
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                    gap: 20px;
                    padding: 20px;
                `;
                contentBody.appendChild(areasContainer);
            }
            
            // Crear nueva área
            const areaCount = areasContainer.querySelectorAll('.area-item').length + 1;
            const newArea = document.createElement('div');
            newArea.className = 'area-item';
            newArea.id = `area_${areaCount}`;
            newArea.style.cssText = `
                background: white;
                border: 1px solid #dee2e6;
                border-radius: 8px;
                padding: 20px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                transition: all 0.3s ease;
            `;
            newArea.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0; color: #495057; font-size: 16px; font-weight: 600;">
                        <i class="bi bi-folder" style="margin-right: 8px; color: #28a745;"></i>
                        Área ${areaCount}
                    </h3>
                    <div style="display: flex; gap: 8px;">
                        <button class="add-button" onclick="addNoteToArea(event, '${areaCount}')" style="width: 28px; height: 28px;">
                            <i class="bi bi-plus"></i>
                        </button>
                        <button class="nav-button" onclick="deleteArea(${areaCount})" style="padding: 4px 8px; background-color: #28a745; color: white; border-color: #28a745;">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
                <div style="background: #f8f9fa; border-radius: 4px; padding: 15px; min-height: 200px;">
                    <p style="margin: 0; color: #6c757d; font-style: italic;">Contenido del área ${areaCount}...</p>
                </div>
            `;
            
            // Agregar la nueva área al contenedor
            areasContainer.appendChild(newArea);
            
            // Agregar a la barra lateral
            addSelectedItem('Área', `Área ${areaCount}`, 'folder', `area_${areaCount}`);
            
            // Mostrar notificación
            showNotification(`Área ${areaCount} creada exitosamente`, 'success');
        }
        
        function addNewNotesArea() {
            closeDropdown(); // Cerrar el dropdown
            
            // Crear nueva área de notas en el contenido principal
            const contentBody = document.querySelector('.content-body');
            
            // Eliminar el estado vacío si existe
            const emptyState = contentBody.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            // Crear contenedor para las áreas de notas si no existe
            let notesAreasContainer = contentBody.querySelector('.notes-areas-container');
            if (!notesAreasContainer) {
                notesAreasContainer = document.createElement('div');
                notesAreasContainer.className = 'notes-areas-container';
                notesAreasContainer.style.cssText = `
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                    gap: 20px;
                    padding: 20px;
                    margin-bottom: 30px;
                    border: 2px solid #d4edda;
                    border-radius: 8px;
                    background: #f8f9fa;
                `;
                
                // Agregar header para la sección de áreas de notas
                const sectionHeader = document.createElement('div');
                sectionHeader.style.cssText = `
                    background: #28a745;
                    color: white;
                    padding: 12px 20px;
                    margin: -20px -20px 15px -20px;
                    border-radius: 8px 8px 0 0;
                    font-size: 16px;
                    font-weight: 600;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                `;
                sectionHeader.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <i class="bi bi-sticky"></i>
                        ÁREAS DE NOTAS
                    </div>
                    <div style="font-size: 12px; opacity: 0.8;">
                        <span id="notesAreasCount">0</span> áreas de notas creadas
                    </div>
                `;
                notesAreasContainer.appendChild(sectionHeader);
                
                contentBody.appendChild(notesAreasContainer);
            }
            
            // Crear nueva área de notas
            const areaCount = notesAreasContainer.querySelectorAll('.area-item').length + 1;
            const newNotesArea = document.createElement('div');
            newNotesArea.className = 'area-item';
            newNotesArea.id = `notes_${areaCount}`;
            newNotesArea.style.cssText = `
                background: white;
                border: 1px solid #dee2e6;
                border-radius: 8px;
                padding: 20px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                transition: all 0.3s ease;
            `;
            newNotesArea.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0; color: #495057; font-size: 16px; font-weight: 600;">
                        <i class="bi bi-sticky" style="margin-right: 8px; color: #28a745;"></i>
                        Área de Notas ${areaCount}
                    </h3>
                    <div style="display: flex; gap: 8px;">
                        <button class="add-button" onclick="addNoteToArea(event, 'notes_${areaCount}')" style="width: 28px; height: 28px;">
                            <i class="bi bi-plus"></i>
                        </button>
                        <button class="nav-button" onclick="deleteArea('notes_${areaCount}')" style="padding: 4px 8px; background-color: #28a745; color: white; border-color: #28a745;">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
                <div style="background: #f8f9fa; border-radius: 4px; padding: 15px; min-height: 200px;">
                    <p style="margin: 0; color: #6c757d; font-style: italic;">Área de notas especializada...</p>
                </div>
            `;
            
            // Agregar el área de notas al contenedor
            notesAreasContainer.appendChild(newNotesArea);
            
            // Actualizar contador
            updateNotesAreasCount();
            
            // Agregar a la barra lateral
            addSelectedItem('Área de Notas', `Área de Notas ${areaCount}`, 'sticky', `notes_${areaCount}`);
            
            // Mostrar notificación
            showNotification(`Área de Notas ${areaCount} creada exitosamente`, 'success');
        }
        
        function updateAreasCount() {
            const areasContainer = document.querySelector('.areas-container');
            const countElement = document.getElementById('areasCount');
            if (areasContainer && countElement) {
                const count = areasContainer.querySelectorAll('.area-item').length;
                countElement.textContent = count;
            }
        }

            if (emptyMessage) {

            if (!tabsNav) {

            let tabButton = document.getElementById(`tab_${typeId}`);
            let tabContent = document.getElementById(`content_${typeId}`);

                tabContent.id = `content_${typeId}`;
                tabContent.innerHTML = `
                    <div class="empty-tab">

                    </div>
                `;
                container.appendChild(tabContent);
            }

            const emptyTab = tabContent.querySelector('.empty-tab');

                emptyTab.remove();
            }
            
            // Crear nuevo elemento
            const item = document.createElement('div');
            item.className = 'tab-item';

        function switchTab(typeId) {

            // Activar la pestaña seleccionada
            const tabButton = document.getElementById(`tab_${typeId}`);
            const tabContent = document.getElementById(`content_${typeId}`);
            
            if (tabButton && tabContent) {

        function downloadPDF(pdfId) {
            const pdfData = localStorage.getItem(`pdf_${pdfId}`);
            const pdfName = localStorage.getItem(`pdf_name_${pdfId}`);
            
            if (pdfData && pdfName) {
                // Convertir base64 a blob y descargar
                const byteCharacters = atob(pdfData.split(',')[1]);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/pdf' });
                
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = pdfName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                showNotification(`Descargando "${pdfName}"`, 'info');
            }
        }

            }
        }
